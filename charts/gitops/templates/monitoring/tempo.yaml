apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.18.1
    chart: tempo
    helm:
      values: |
        replicas: 1
        tempo:
          repository: grafana/tempo
          tag: "2.7.0"
          updateStrategy: RollingUpdate
          resources:
            requests:
              cpu: 100m
              memory: 128Mi

          metricsGenerator:
            enabled: true
            config:
              storage:
                path: /var/tempo/generator/wal
              remote_write:
                - url: "http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write"
              processors:
                - service-graphs
                - span-metrics
          
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
              wal:
                path: /var/tempo/wal

          reportingEnabled: false

        gateway:
          enabled: false

        persistence:
          enabled: true
          size: 10Gi
          accessModes:
            - ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true