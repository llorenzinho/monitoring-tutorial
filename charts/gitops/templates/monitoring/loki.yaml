apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.27.0
    chart: loki
    helm:
      values: |
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: 'filesystem' # Just for home lab
          
        deploymentMode: SingleBinary
        
        monitoring:
          dashboards:
            enabled: true
          serviceMonitor:
            enabled: true
            metricsNamespace: monitoring
            
        promtail:
          enabled: true
          config:
            clients:
              - url: http://{{ .Release.Name }}:3100/loki/api/v1/push
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true