apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 82.10.5
    chart: kube-prometheus-stack
    helm:
      values: |
        prometheusOperator:
          admissionWebhooks:
            patch:
              enabled: true
        prometheus:
          prometheusSpec:
            enableRemoteWriteReceiver: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Abilita il Server-Side Apply per gestire CRD pesanti
      - SkipDryRunOnMissingResource=true