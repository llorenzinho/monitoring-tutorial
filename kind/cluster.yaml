apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: monitoring-tutorial

nodes:
  - role: control-plane
    extraPortMappings:
      # ArgoCD UI
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Grafana
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Backend API
      - containerPort: 30800
        hostPort: 8800
        protocol: TCP
  - role: worker
  - role: worker
